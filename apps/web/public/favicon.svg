<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- 渐变定义 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff5e6"/>
      <stop offset="100%" style="stop-color:#ffe4cc"/>
    </linearGradient>
    <linearGradient id="cheekGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffb6c1"/>
      <stop offset="100%" style="stop-color:#ff91a4"/>
    </linearGradient>
  </defs>
  
  <!-- 圆形背景 -->
  <circle cx="50" cy="50" r="48" fill="url(#bgGrad)"/>
  
  <!-- 耳朵 -->
  <ellipse cx="25" cy="30" rx="15" ry="18" fill="#f5deb3"/>
  <ellipse cx="25" cy="30" rx="10" ry="12" fill="#ffb6c1"/>
  <ellipse cx="75" cy="30" rx="15" ry="18" fill="#f5deb3"/>
  <ellipse cx="75" cy="30" rx="10" ry="12" fill="#ffb6c1"/>
  
  <!-- 头部 -->
  <ellipse cx="50" cy="55" rx="38" ry="32" fill="#f5deb3"/>
  
  <!-- 眼睛 -->
  <ellipse cx="35" cy="50" rx="8" ry="10" fill="#4a4a4a"/>
  <ellipse cx="65" cy="50" rx="8" ry="10" fill="#4a4a4a"/>
  
  <!-- 眼睛高光 -->
  <circle cx="32" cy="47" r="3" fill="#fff"/>
  <circle cx="62" cy="47" r="3" fill="#fff"/>
  <circle cx="37" cy="52" r="1.5" fill="#fff"/>
  <circle cx="67" cy="52" r="1.5" fill="#fff"/>
  
  <!-- 鼻子 -->
  <ellipse cx="50" cy="58" rx="4" ry="3" fill="#ff91a4"/>
  
  <!-- 嘴巴 -->
  <path d="M42 62 Q50 68 58 62" fill="none" stroke="#4a4a4a" stroke-width="2" stroke-linecap="round"/>
  
  <!-- 腮红 -->
  <ellipse cx="22" cy="58" rx="8" ry="5" fill="url(#cheekGrad)" opacity="0.7"/>
  <ellipse cx="78" cy="58" rx="8" ry="5" fill="url(#cheekGrad)" opacity="0.7"/>
  
  <!-- 嘴巴小牙齿 -->
  <path d="M47 65 L50 68 L53 65" fill="#fff" stroke="#4a4a4a" stroke-width="0.5"/>
</svg>
